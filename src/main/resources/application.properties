spring.application.name=kaihatsu-nikki
# ===============================
# H2 DATABASE CONFIG
# ===============================

spring.datasource.url=jdbc:mysql://localhost:3310/kaihatsu_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=kaihatsu_user
spring.datasource.password=kaihatsu_pass
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Hibernate / JPA settings
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true


# Optional: Change port if needed
server.port=8080
